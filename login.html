<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV Portal | Authenticate</title>
    <meta name="description" content="Access the PV Studios digital dashboard. Authenticate using local credentials or Google Identity Services.">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@200;300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <!-- Custom Interactive Cursor Elements -->
    <div class="custom-cursor-dot"></div>
    <div class="custom-cursor-ring"></div>

    <!-- Interactive Gravity Particle Field Canvas -->
    <canvas id="gravity-canvas"></canvas>

    <!-- Glowing Background Atmosphere -->
    <div class="ambient-glows">
        <div class="glow-orange-center"></div>
    </div>

    <!-- Main Container -->
    <div class="login-wrapper">
        <!-- Floating Home Button -->
        <a href="index.html" class="btn-back-home">
            <svg class="back-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19 12H5M12 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Back to Studios</span>
        </a>

        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="login-logo-container">
                    <img src="assets/logo.png" alt="PV Studios Logo" class="login-logo">
                </div>
                <h1 class="login-title">PV PORTAL</h1>
                <p class="login-subtitle">Enter your credentials to access the console</p>
            </div>

            <!-- Tab Toggles -->
            <div class="login-tabs">
                <button class="login-tab active" id="tab-signin">SIGN IN</button>
                <button class="login-tab" id="tab-signup">CREATE ACCOUNT</button>
            </div>

            <!-- Panel 1: Credentials Form -->
            <div id="panel-credentials" class="auth-panel">
                <form id="form-login" class="login-form">
                    <!-- Username field (hidden on Sign In, visible on Sign Up) -->
                    <div class="input-group hidden" id="group-username">
                        <input type="text" id="auth-username">
                        <label for="auth-username">Username</label>
                        <span class="input-line"></span>
                    </div>

                    <!-- Email field -->
                    <div class="input-group">
                        <input type="email" id="auth-email" required>
                        <label for="auth-email">Email Address</label>
                        <span class="input-line"></span>
                    </div>

                    <!-- Password field -->
                    <div class="input-group">
                        <input type="password" id="auth-password" required>
                        <label for="auth-password">Password</label>
                        <span class="input-line"></span>
                    </div>

                    <!-- Options -->
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember-me">
                            <span class="checkmark"></span>
                            Remember Session
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <!-- Human Verification Captcha Slider (Only visible on Create Account mode) -->
                    <div class="captcha-slider-wrapper hidden" id="captcha-wrapper">
                        <div class="captcha-slider-track">
                            <div class="captcha-slider-handle" id="captcha-handle">&gt;&gt;</div>
                            <span class="captcha-slider-text" id="captcha-text">Slide to Verify Human</span>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-auth-submit" id="btn-login-submit">
                        <span>ENTER PORTAL</span>
                        <span class="btn-arrow">↗</span>
                    </button>
                </form>
            </div>

            <!-- Panel 3: Customer Details Profile Setup -->
            <div id="panel-details" class="auth-panel hidden">
                <form id="form-details" class="login-form">
                    <p class="panel-info">Complete your profile to gain portal access:</p>
                    
                    <!-- Full Name -->
                    <div class="input-group">
                        <input type="text" id="details-name" required>
                        <label for="details-name">Full Name</label>
                        <span class="input-line"></span>
                    </div>

                    <!-- Contact Number -->
                    <div class="input-group">
                        <input type="tel" id="details-phone" required>
                        <label for="details-phone">Contact Number</label>
                        <span class="input-line"></span>
                    </div>

                    <!-- Physical/Billing Address -->
                    <div class="input-group textarea-group">
                        <textarea id="details-address" rows="3" required placeholder=" "></textarea>
                        <label for="details-address">Physical / Billing Address</label>
                        <span class="input-line"></span>
                    </div>

                    <button type="submit" class="btn-auth-submit" id="btn-details-submit">
                        <span>COMPLETE PROFILE</span>
                        <span class="btn-arrow">↗</span>
                    </button>
                </form>
            </div>

            <!-- Alert Box for Notifications -->
            <div id="auth-alert" class="auth-alert"></div>
        </div>
    </div>

    <!-- Client Script -->
    <script type="module" src="login.js"></script>
</body>
</html>
